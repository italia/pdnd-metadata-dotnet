description:
  en:
    shortDescription: ".NET library for extracting PDND request metadata"
    longDescription: >
      Lightweight multi-target .NET library for extracting request metadata from HTTP calls
      with support for PDND interoperability scenarios including voucher, DPoP, digest,
      tracking evidence and distributed tracing metadata.
    features:
      - Automatic PDND metadata extraction
      - Standardized metadata snapshot
      - Correlation and distributed tracing support
      - Safe handling of sensitive headers
      - ASP.NET Core integration
  it:
    shortDescription: "Libreria .NET per estrarre i metadati PDND dalle richieste HTTP"
    longDescription: >
      Libreria .NET multi-target per l’estrazione dei metadati delle richieste HTTP in ingresso
      con supporto agli scenari PDND come voucher, DPoP, digest, tracking evidence e tracing.
    features:
      - Estrazione automatica dei metadati PDND
      - Snapshot standard dei metadati
      - Supporto a correlazione e tracing
      - Gestione sicura di header e token sensibili
      - Integrazione con ASP.NET Core
